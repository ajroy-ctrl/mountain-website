<!-- @dsCard group="Colors" viewport="700x150" name="Royal Blue" subtitle="Primary brand action color" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;padding:18px 20px}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{height:64px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle)}
  .name{font-size:12px;font-weight:700;color:var(--text-strong)}
  .hex{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
  .tok{font-size:10.5px;color:var(--text-muted)}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><span class="name">Blue 700</span><span class="hex">#1442b0</span><span class="tok">--blue-700 · hover</span></div>
  <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><span class="name">Blue 600</span><span class="hex">#1d5fe8</span><span class="tok">--blue-600 · primary</span></div>
  <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><span class="name">Blue 500</span><span class="hex">#3b78f5</span><span class="tok">--blue-500 · focus</span></div>
  <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><span class="name">Blue 100</span><span class="hex">#dbe6fd</span><span class="tok">--blue-100</span></div>
  <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><span class="name">Blue 50</span><span class="hex">#f0f5ff</span><span class="tok">--blue-50</span></div>
</div>
</body></html>
