<!-- @dsCard group="Type" viewport="700x140" name="Overline & Mono" subtitle="Eyebrows, table labels, numeric/mono" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .wrap{padding:22px 24px;display:flex;flex-direction:column;gap:18px}
  .row{display:flex;align-items:center;gap:16px}
  .over{font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue-600)}
  .tbl{font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
  .mono{font-family:var(--font-mono);font-size:14px;color:var(--text-strong)}
  .meta{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="wrap">
  <div class="row"><span class="over">● Your Recruiting Partner</span><span class="meta">overline · --ls-wide</span></div>
  <div class="row"><span class="tbl">Candidate Name</span><span class="tbl">Screening Status</span><span class="tbl">Rating</span><span class="meta">table label · 2xs</span></div>
  <div class="row"><span class="mono">503-887-1019</span><span class="mono">62234</span><span class="meta">--font-mono · phone / IDs</span></div>
</div>
</body></html>
