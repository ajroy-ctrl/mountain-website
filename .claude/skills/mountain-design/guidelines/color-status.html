<!-- @dsCard group="Colors" viewport="700x150" name="Status" subtitle="PASS / FAIL / PENDING semantic colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding:20px}
  .pair{display:flex;flex-direction:column;gap:10px}
  .demo{display:flex;align-items:center;gap:10px;padding:14px;border-radius:var(--radius-md)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12px;letter-spacing:.02em;text-transform:uppercase;padding:5px 11px;border-radius:var(--radius-pill)}
  .dot{width:6px;height:6px;border-radius:50%}
  .meta{font-size:10.5px;color:var(--text-muted);font-family:var(--font-mono)}
  .name{font-size:12px;font-weight:700;color:var(--text-strong)}
</style></head><body>
<div class="grid">
  <div class="pair"><div class="demo" style="background:var(--green-100)"><span class="pill" style="color:var(--green-600);background:#fff"><span class="dot" style="background:var(--green-600)"></span>PASS</span></div><span class="name">Pass / Success</span><span class="meta">--green-600 · --green-100</span></div>
  <div class="pair"><div class="demo" style="background:var(--red-100)"><span class="pill" style="color:var(--red-600);background:#fff"><span class="dot" style="background:var(--red-600)"></span>FAIL</span></div><span class="name">Fail / Danger</span><span class="meta">--red-600 · --red-100</span></div>
  <div class="pair"><div class="demo" style="background:var(--amber-100)"><span class="pill" style="color:var(--amber-600);background:#fff"><span class="dot" style="background:var(--amber-600)"></span>Pending</span></div><span class="name">Pending / Warn</span><span class="meta">--amber-600 · --amber-100</span></div>
</div>
</body></html>
