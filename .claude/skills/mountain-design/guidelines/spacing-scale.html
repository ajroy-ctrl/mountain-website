<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .wrap{padding:20px 24px;display:flex;align-items:flex-end;gap:16px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--blue-600);border-radius:var(--radius-xs);width:100%}
  .v{font-size:11px;font-weight:700;color:var(--text-strong)}
  .t{font-size:10px;color:var(--text-muted);font-family:var(--font-mono)}
  .col{width:48px}
</style></head><body>
<div class="wrap">
  <div class="col"><div class="bar" style="height:4px"></div><span class="v">4</span><span class="t">1</span></div>
  <div class="col"><div class="bar" style="height:8px"></div><span class="v">8</span><span class="t">2</span></div>
  <div class="col"><div class="bar" style="height:12px"></div><span class="v">12</span><span class="t">3</span></div>
  <div class="col"><div class="bar" style="height:16px"></div><span class="v">16</span><span class="t">4</span></div>
  <div class="col"><div class="bar" style="height:24px"></div><span class="v">24</span><span class="t">6</span></div>
  <div class="col"><div class="bar" style="height:32px"></div><span class="v">32</span><span class="t">8</span></div>
  <div class="col"><div class="bar" style="height:48px"></div><span class="v">48</span><span class="t">12</span></div>
  <div class="col"><div class="bar" style="height:64px"></div><span class="v">64</span><span class="t">16</span></div>
  <div class="col"><div class="bar" style="height:80px"></div><span class="v">80</span><span class="t">20</span></div>
</div>
</body></html>
