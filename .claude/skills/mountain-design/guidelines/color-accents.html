<!-- @dsCard group="Colors" viewport="700x150" name="Indigo & Lavender" subtitle="Logo accent hues" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;padding:18px 20px}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{height:64px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle)}
  .name{font-size:12px;font-weight:700;color:var(--text-strong)}
  .hex{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
  .tok{font-size:10.5px;color:var(--text-muted)}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--indigo-500)"></div><span class="name">Indigo 500</span><span class="hex">#4f53c0</span><span class="tok">--indigo-500 · logo blue</span></div>
  <div class="sw"><div class="chip" style="background:var(--periwinkle-400)"></div><span class="name">Periwinkle 400</span><span class="hex">#8b9cf7</span><span class="tok">--periwinkle-400 · avatar</span></div>
  <div class="sw"><div class="chip" style="background:var(--lavender-400)"></div><span class="name">Lavender 400</span><span class="hex">#b18cff</span><span class="tok">--lavender-400 · logo purple</span></div>
  <div class="sw"><div class="chip" style="background:var(--lavender-100)"></div><span class="name">Lavender 100</span><span class="hex">#ece2ff</span><span class="tok">--lavender-100</span></div>
</div>
</body></html>
