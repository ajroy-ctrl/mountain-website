<!-- @dsCard group="Brand" viewport="700x190" name="Logo — Lockup" subtitle="Stacked MOUNTAIN wordmark variants" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .wrap{padding:22px 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;height:128px;border-radius:var(--radius-md);border:1px solid var(--border-subtle)}
  .tile img{height:78px;width:auto}
  .cap{font-size:10.5px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="wrap">
  <div class="tile" style="background:#fff"><img src="../assets/logos/mountain-lockup-black.png" alt="Mountain lockup black"/><span class="cap">primary · ink</span></div>
  <div class="tile" style="background:var(--blue-50)"><img src="../assets/logos/mountain-lockup-blue.png" alt="Mountain lockup blue"/><span class="cap">indigo</span></div>
  <div class="tile" style="background:var(--lavender-100)"><img src="../assets/logos/mountain-lockup-purple.png" alt="Mountain lockup purple"/><span class="cap">lavender</span></div>
</div>
</body></html>
