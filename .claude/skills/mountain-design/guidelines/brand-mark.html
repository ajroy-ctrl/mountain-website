<!-- @dsCard group="Brand" viewport="700x180" name="Logo — Mark" subtitle="The M monogram across surfaces" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .wrap{padding:22px 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:118px;border-radius:var(--radius-md);border:1px solid var(--border-subtle)}
  .tile img{height:54px;width:auto}
  .cap{font-size:10.5px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="wrap">
  <div class="tile" style="background:#fff"><img src="../assets/logos/mountain-mark-ink.png" alt="Mountain mark black"/><span class="cap">ink on light</span></div>
  <div class="tile" style="background:var(--ink-900)"><img src="../assets/logos/mountain-mark-white.png" alt="Mountain mark white"/><span class="cap" style="color:var(--grey-400)">white on dark</span></div>
  <div class="tile" style="background:var(--grey-100)"><img src="../assets/logos/mountain-mark-grey.png" alt="Mountain mark grey"/><span class="cap">grey on tint</span></div>
</div>
</body></html>
