<!-- @dsCard group="Colors" viewport="700x150" name="Ink & Navy" subtitle="Brand darks — marketing bg & portal chrome" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;padding:18px 20px}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{height:64px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle)}
  .name{font-size:12px;font-weight:700;color:var(--text-strong)}
  .hex{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
  .tok{font-size:10.5px;color:var(--text-muted)}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><span class="name">Ink 900</span><span class="hex">#0a0c15</span><span class="tok">--ink-900</span></div>
  <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><span class="name">Ink 800</span><span class="hex">#11152a</span><span class="tok">--ink-800</span></div>
  <div class="sw"><div class="chip" style="background:var(--navy-800)"></div><span class="name">Navy 800</span><span class="hex">#1e2d5a</span><span class="tok">--navy-800</span></div>
  <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><span class="name">Navy 700</span><span class="hex">#27376a</span><span class="tok">--navy-700</span></div>
  <div class="sw"><div class="chip" style="background:var(--navy-600)"></div><span class="name">Navy 600</span><span class="hex">#324488</span><span class="tok">--navy-600</span></div>
</div>
</body></html>
