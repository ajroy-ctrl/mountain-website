<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals" subtitle="Greys — surfaces, borders, text" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px 0;padding:18px 20px}
  .sw{display:flex;flex-direction:column;gap:6px}
  .chip{height:48px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle)}
  .name{font-size:11.5px;font-weight:700;color:var(--text-strong)}
  .hex{font-size:10.5px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--grey-50)"></div><span class="name">Grey 50</span><span class="hex">#f6f7fb · page</span></div>
  <div class="sw"><div class="chip" style="background:var(--grey-100)"></div><span class="name">Grey 100</span><span class="hex">#eef1f6</span></div>
  <div class="sw"><div class="chip" style="background:var(--grey-200)"></div><span class="name">Grey 200</span><span class="hex">#e2e6ef · border</span></div>
  <div class="sw"><div class="chip" style="background:var(--grey-300)"></div><span class="name">Grey 300</span><span class="hex">#cbd2e0</span></div>
  <div class="sw"><div class="chip" style="background:var(--grey-400)"></div><span class="name">Grey 400</span><span class="hex">#9aa3b5</span></div>
  <div class="sw"><div class="chip" style="background:var(--grey-500)"></div><span class="name">Grey 500</span><span class="hex">#6b7385 · muted</span></div>
  <div class="sw"><div class="chip" style="background:var(--grey-600)"></div><span class="name">Grey 600</span><span class="hex">#474b4f</span></div>
  <div class="sw"><div class="chip" style="background:var(--grey-700)"></div><span class="name">Grey 700</span><span class="hex">#2c3140 · body</span></div>
  <div class="sw"><div class="chip" style="background:var(--white);border:1px solid var(--border-strong)"></div><span class="name">White</span><span class="hex">#ffffff · card</span></div>
</div>
</body></html>
