<!-- @dsCard group="Spacing" viewport="700x160" name="Shadows" subtitle="Cool navy-tinted elevation" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--grey-50)}
  .wrap{padding:26px 24px;display:flex;gap:26px}
  .col{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:96px;height:64px;background:#fff;border-radius:var(--radius-md)}
  .n{font-size:11px;font-weight:700;color:var(--text-strong)}
  .t{font-size:10px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="wrap">
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="n">XS</span><span class="t">--shadow-xs</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">SM</span><span class="t">cards/rows</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">MD</span><span class="t">popovers</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">LG</span><span class="t">modals/hover</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-focus)"></div><span class="n">Focus</span><span class="t">--shadow-focus</span></div>
</div>
</body></html>
