<!-- @dsCard group="Type" viewport="700x200" name="Headings & Body — Satoshi" subtitle="UI + body copy · clean grotesk" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .wrap{padding:20px 24px;display:flex;flex-direction:column;gap:12px}
  .row{display:flex;align-items:baseline;gap:14px}
  .meta{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);white-space:nowrap}
  h1,h2,h3,p{margin:0;color:var(--text-strong);font-family:var(--font-sans)}
  h1{font-size:36px;font-weight:700;letter-spacing:-0.01em}
  h2{font-size:28px;font-weight:700}
  h3{font-size:22px;font-weight:700}
  p{font-size:16px;font-weight:400;line-height:1.5;color:var(--text-body);max-width:46ch}
</style></head><body>
<div class="wrap">
  <div class="row"><h1>Heading 1</h1><span class="meta">--fs-h1 · 700</span></div>
  <div class="row"><h2>Heading 2</h2><span class="meta">--fs-h2 · 700</span></div>
  <div class="row"><h3>Heading 3</h3><span class="meta">--fs-h3 · 700</span></div>
  <p>Mountain Group runs your complete driver qualification pipeline — sourcing, screening, background checks, drug tests, and physicals. <span class="meta">--fs-base · 1rem / 400</span></p>
</div>
</body></html>
