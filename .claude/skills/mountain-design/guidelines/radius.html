<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="Corner radii — tight portal to soft marketing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card)}
  .wrap{padding:20px 24px;display:flex;gap:20px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:72px;height:56px;background:var(--blue-50);border:1.5px solid var(--blue-600)}
  .n{font-size:11px;font-weight:700;color:var(--text-strong)}
  .t{font-size:10px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="wrap">
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="n">XS · 4</span><span class="t">--radius-xs</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="n">SM · 6</span><span class="t">buttons/inputs</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="n">MD · 10</span><span class="t">cards</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="n">LG · 16</span><span class="t">marketing</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="n">XL · 24</span><span class="t">--radius-xl</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="n">Pill</span><span class="t">badges/CTA</span></div>
</div>
</body></html>
